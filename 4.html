<body>
  <script>
    let nama = "Budi Hartono";
    let nilaiTeori = 70;
    let nilaiPraktek = 70;
    let kehadiran = 90;
    let pelanggaranBerat = false;
    let rata = (nilaiTeori + nilaiPraktek) / 2;

    let status = "";

    if (kehadiran < 90) {
      status = "Tidak Lulus (Kehadiran kurang)"
    } else if (nilaiTeori < 75) {
      status = "Tidak Lulus (Praktek kurang)"
    } else if (pelanggaranBerat === true) {
      status = "Tidak Lulus (Pelanggaran Disiplin)"
    } else {
      if (rata > 90) {
        status = "Lulus dengan predikat sangat baik"
      } else if (rata > 85) {
        status = "Lulus dengan predikat baik"
      } else {
        status = "Lulus Standart"
      }
      document.getElementById("hasil").innerHTML =
        `
          <p> ${nama} </p>
          <p> ${rata} </p>
          <p> ${status} </p>
        `
    }
  </script>
